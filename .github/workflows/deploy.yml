# Deploy to Azure App Service on every push to main.
#
# Auth strategy: GitHub OIDC + Azure Workload Identity Federation
# (no long-lived service principal secrets stored in GitHub).
#
# Required GitHub secrets / variables:
#   AZURE_CLIENT_ID      — app registration client ID (federated credential)
#   AZURE_TENANT_ID      — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID — Azure subscription
#   AZURE_WEBAPP_NAME    — App Service name (e.g. "social-media-agent")
#
# Required Azure setup (one-time, see docs/deployment/azure-app-service.md):
#   1. Create an App Registration in Entra ID.
#   2. Add a federated credential for repo:<org>/<repo>:ref:refs/heads/main.
#   3. Grant "Website Contributor" on the App Service resource.

name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC token exchange
  contents: read

jobs:
  # ── Build & lint ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "1"

      - name: Run tests
        run: npm test -- --run
        env:
          SKIP_ENV_VALIDATION: "1"

      # Package the build output for deployment.
      - name: Zip artifact
        run: |
          zip -r release.zip \
            .next \
            public \
            node_modules \
            package.json \
            package-lock.json \
            scripts \
            src/db/migrations \
            src \
            tsconfig.json \
            next.config.ts

      - uses: actions/upload-artifact@v4
        with:
          name: release
          path: release.zip
          retention-days: 1

  # ── Migrate ─────────────────────────────────────────────────────────────────
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate:prod
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SKIP_ENV_VALIDATION: "1"

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: migrate
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release

      - name: Unzip artifact
        run: unzip release.zip

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: release.zip
